# =============================================================================
# TAKT UI Labels — English
# =============================================================================
# User-facing display strings (not AI prompts).
# Template variables use {variableName} syntax.
# =============================================================================

# ===== Interactive Mode UI =====
interactive:
  conversationLabel: "Conversation:"
  noTranscript: "(No local transcript. Summarize the current session context.)"
  ui:
    intro: "Interactive mode - describe your task. Commands: /go (create instruction & run), /play (run now), /resume (load session), /cancel (exit)"
    resume: "Resuming previous session"
    noConversation: "No conversation yet. Please describe your task first."
    summarizeFailed: "Failed to summarize conversation. Please try again."
    continuePrompt: "Okay, continue describing your task."
    proposed: "Proposed task instruction:"
    actionPrompt: "What would you like to do?"
    actions:
      execute: "Execute now"
      createIssue: "Create Issue"
      saveTask: "Save as Task"
      continue: "Continue editing"
    cancelled: "Cancelled"
    playNoTask: "Please specify task content: /play <task>"
    retryNoOrder: "No previous order (order.md) found. /retry is only available during retry."
    retryUnavailable: "/retry is only available in Retry mode from `takt list`."
    personaFallback: "No persona available for the first step. Falling back to assistant mode."
  modeSelection:
    prompt: "Select interactive mode:"
    assistant: "Assistant"
    assistantDescription: "Ask clarifying questions before generating instructions"
    persona: "Persona"
    personaDescription: "Converse as the first agent's persona"
    quiet: "Quiet"
    quietDescription: "Generate instructions without asking questions"
    passthrough: "Passthrough"
    passthroughDescription: "Pass your input directly as task text"
  runSelector:
    confirm: "Reference a previous run's results?"
    prompt: "Select a run to reference:"
    noRuns: "No previous runs found."
  continueNoSession: "No previous assistant session found. Starting a new session."
  resumeSessionLoaded: "Session loaded. Subsequent AI calls will use this session."
  sessionSelector:
    prompt: "Resume from a recent session?"
    newSession: "New session"
    newSessionDescription: "Start a fresh conversation"
    noSessions: "No resumable sessions were found. Starting a new session."
    lastResponse: "Last: {response}"
    messages: "{count} messages"
  previousTask:
    success: "✅ Previous task completed successfully"
    error: "❌ Previous task failed: {error}"
    userStopped: "⚠️ Previous task was interrupted by user"
    workflow: "Workflow: {workflowName}"
    timestamp: "Executed: {timestamp}"
  commands:
    play: "Run a task immediately"
    go: "Create instruction & run"
    retry: "Review & rerun with previous instructions"
    replay: "Rerun immediately with previous instructions"
    cancel: "Exit interactive mode"
    resume: "Load a previous session"

# ===== Workflow Execution UI =====
workflow:
  teamLeader:
    decomposeWait: "Team leader is decomposing tasks. This may take some time..."
    feedbackWait: "Team leader is reviewing results and planning next tasks..."
  iterationLimit:
    maxReached: "Reached max iterations ({currentIteration}/{maxSteps})"
    currentStep: "Current step: {currentStep}"
    continueQuestion: "Continue?"
    continueLabel: "Continue (enter additional iterations)"
    continueDescription: "Increase the limit by the entered count"
    stopLabel: "Stop"
    inputPrompt: "Enter additional iterations (>= 1)"
    invalidInput: "Please enter an integer of 1 or greater."
    userInputPrompt: "Enter additional instructions (empty to cancel)"
  notifyComplete: "Workflow complete ({iteration} iterations)"
  notifyAbort: "Aborted: {reason}"
  sigintGraceful: "Ctrl+C: Aborting workflow..."
  sigintTimeout: "Graceful shutdown timed out after {timeoutMs}ms"
  sigintForce: "Ctrl+C: Force exit"

# ===== Instruct Mode UI (takt list -> instruct) =====
instruct:
  ui:
    intro: "Instruct mode - describe additional instructions. Commands: /go (create instruction & run), /replay (resubmit previous order), /cancel (exit)"
    resume: "Resuming previous session"
    noConversation: "No conversation yet. Please describe your instructions first."
    summarizeFailed: "Failed to create instruction. Please try again."
    continuePrompt: "Okay, continue describing your instructions."
    proposed: "Proposed additional instructions:"
    actionPrompt: "What would you like to do?"
    actions:
      execute: "Execute now"
      saveTask: "Save as Task"
      continue: "Continue editing"
    cancelled: "Cancelled"
    replayNoOrder: "Previous order (order.md) not found"

# ===== Retry Mode UI (takt list -> retry) =====
retry:
  ui:
    intro: "Retry mode - describe additional instructions. Commands: /go (create instruction & run), /retry (rerun previous order), /cancel (exit)"
  usePreviousWorkflowConfirm: "Use previous workflow \"{workflow}\"?"

run:
  notifyComplete: "Run complete ({total} tasks)"
  notifyAbort: "Run finished with errors ({failed})"

# ===== Issue Creation UI =====
issue:
  labelSelection:
    prompt: "Label:"
    none: "None"
    custom: "Custom input"
    customPrompt: "Enter label name"
