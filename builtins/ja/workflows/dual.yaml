name: dual
description: フロントエンド＋バックエンド開発ワークフロー（テスト先行 → チームリーダー実装 → AIレビュー → 2段階レビュー → 修正ループ → 監督）
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 60
initial_step: plan
loop_monitors:
  - cycle:
      - ai_review
      - ai_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-fix
      rules:
        - condition: 健全（進捗あり）
          next: ai_review
        - condition: 非生産的（改善なし）
          next: reviewers_1
  - cycle:
      - reviewers_1
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: 健全（指摘数が減少、修正が反映されている）
          next: reviewers_1
        - condition: 非生産的（同じ指摘が繰り返される）
          next: supervise
steps:
  - name: plan
    edit: false
    persona: planner
    policy:
      - design-planning
    knowledge:
      - frontend
      - react
      - backend
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: plan
    rules:
      - condition: タスク分析と計画が完了した
        next: write_tests
      - condition: 要件が不明確で計画を立てられない
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}
    output_contracts:
      report:
        - name: plan.md
          format: plan-frontend
  - name: write_tests
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - frontend
      - react
      - backend
      - architecture
      - unit-testing
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: write-tests-first
    rules:
      - condition: テスト作成が完了した
        next: implement
      - condition: テスト対象が未実装のためテスト作成をスキップする
        next: implement
      - condition: テスト作成を進行できない
        next: plan
      - condition: ユーザーへの確認事項があるためユーザー入力が必要
        next: write_tests
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: test-report.md
          format: test-report
  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - design-fidelity
      - screen-api
    session: refresh
    knowledge:
      - frontend
      - react
      - backend
      - security
      - architecture
      - task-decomposition
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    team_leader:
      max_parts: 2
      part_persona: coder
      part_edit: true
      part_permission_mode: edit
      part_allowed_tools:
        - Read
        - Glob
        - Grep
        - Edit
        - Write
        - Bash
        - WebSearch
        - WebFetch
    instruction: dual-team-leader-implement
    rules:
      - condition: 実装が完了した
        next: ai_review
      - condition: 実装未着手（レポートのみ）
        next: ai_review
      - condition: 実装を進行できない
        next: ai_review
      - condition: ユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
    quality_gates:
      - デザイン参照がある場合、主要画面のレイアウト・文言・色・間隔を要素単位で照合したこと
      - デザイン参照がある場合、プラットフォーム制約による差分は決定ログに明記したこと
  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: ai-review
    rules:
      - condition: AI特有の問題が見つからない
        next: reviewers_1
      - condition: AI特有の問題が検出された
        next: ai_fix
    output_contracts:
      report:
        - name: ai-review.md
          format: ai-review
  - name: ai_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - design-fidelity
      - screen-api
    session: refresh
    knowledge:
      - frontend
      - react
      - backend
      - security
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: ai-fix
    pass_previous_response: false
    rules:
      - condition: AI Reviewerの指摘に対する修正が完了した
        next: ai_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: ai_no_fix
      - condition: 修正を進行できない
        next: ai_no_fix
  - name: ai_no_fix
    edit: false
    persona: architecture-reviewer
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    rules:
      - condition: ai_reviewの指摘が妥当（修正すべき）
        next: ai_fix
      - condition: ai_fixの判断が妥当（修正不要）
        next: reviewers_1
    instruction: arbitrate
  - name: reviewers_1
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge:
          - architecture
          - react
          - backend
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-arch
        output_contracts:
          report:
            - name: architect-review.md
              format: architecture-review
      - name: frontend-review
        edit: false
        persona: frontend-reviewer
        policy:
          - review
          - design-fidelity
        knowledge:
          - frontend
          - react
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-frontend
        output_contracts:
          report:
            - name: frontend-review.md
              format: frontend-review
      - name: testing-review
        edit: false
        persona: testing-reviewer
        policy:
          - review
          - testing
        knowledge:
          - unit-testing
          - e2e-testing
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-test
        output_contracts:
          report:
            - name: testing-review.md
              format: testing-review
    rules:
      - condition: all("approved")
        next: reviewers_2
      - condition: any("needs_fix")
        next: fix
  - name: reviewers_2
    parallel:
      - name: security-review
        edit: false
        persona: security-reviewer
        policy: review
        knowledge: security
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-security
        output_contracts:
          report:
            - name: security-review.md
              format: security-review
      - name: qa-review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-qa
        output_contracts:
          report:
            - name: qa-review.md
              format: qa-review
      - name: requirements-review
        edit: false
        persona: requirements-reviewer
        policy: review
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-requirements
        output_contracts:
          report:
            - name: requirements-review.md
              format: requirements-review
    rules:
      - condition: all("approved")
        next: supervise
      - condition: any("needs_fix")
        next: fix
  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - design-fidelity
      - screen-api
    knowledge:
      - frontend
      - react
      - backend
      - security
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    quality_gates:
      - デザイン参照がある場合、修正でレイアウト・文言・色・間隔の差分を増やしていないこと
      - デザイン参照がある場合、残差分は決定ログまたはレビュー根拠で説明できること
    rules:
      - condition: 修正が完了した
        next: reviewers_1
      - condition: 修正を進行できない
        next: plan
    instruction: fix
  - name: supervise
    edit: false
    persona: dual-supervisor
    policy: review
    knowledge:
      - architecture
      - react
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: supervise
    pass_previous_response: false
    rules:
      - condition: すべての検証が完了し、マージ可能な状態である
        next: COMPLETE
      - condition: 問題が検出された
        next: plan
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
