name: audit-architecture-dual
description: フルスタックのアーキテクチャ監査。frontend/backend の境界と横断配線を列挙し、コードを変更せずに Issue 化しやすいレポートを作成する
max_steps: 12
initial_step: plan

loop_monitors:
  - cycle: [supervise, review]
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        デュアルのアーキテクチャ監査で supervise → review が {cycle_count} 回繰り返されています。
        監査レポートと計画レポートを比較し、以下を判断してください:
        - 監査スコープが前回サイクルから拡大しているか（新しいモジュールが監査されたか）
        - 残りの未監査モジュールは合理的なサイクル数で完了可能か
      rules:
        - condition: 監査品質・スコープが十分
          next: COMPLETE
        - condition: スコープが拡大しており改善が続いている
          next: review
        - condition: スコープが停滞し改善の見込みがない
          next: ABORT

steps:
  - name: plan
    persona: planner
    knowledge:
      - frontend
      - backend
      - architecture
    instruction: architecture-audit-plan
    edit: false
    output_contracts:
      report:
        - name: 01-architecture-audit-plan.md
          format: architecture-audit-plan
    rules:
      - condition: Module inventory and audit scope complete
        next: audit
      - condition: Requirements unclear, insufficient info
        next: ABORT

  - name: audit
    persona: architecture-reviewer
    policy: review
    knowledge:
      - frontend
      - backend
      - architecture
    instruction: architecture-audit-team-leader
    edit: false
    team_leader:
      max_parts: 3
      part_persona: architecture-reviewer
      part_edit: false
    output_contracts:
      report:
        - name: 02-architecture-audit.md
          format: architecture-audit
    rules:
      - condition: Audit complete
        next: supervise

  - name: supervise
    persona: supervisor
    policy: review
    knowledge:
      - frontend
      - backend
      - architecture
    instruction: architecture-audit-supervise
    edit: false
    pass_previous_response: false
    rules:
      - condition: Audit is complete and issue-ready
        next: COMPLETE
      - condition: Architecture audit is incomplete or evidence is insufficient
        next: review

  - name: review
    persona: architecture-reviewer
    policy: review
    knowledge:
      - frontend
      - backend
      - architecture
    instruction: architecture-audit-review
    edit: false
    output_contracts:
      report:
        - name: 02-architecture-audit.md
          format: architecture-audit
    rules:
      - condition: Re-audit complete
        next: supervise
